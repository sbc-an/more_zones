 district_MZ_arcology_genomic_research_desc: "Endless arrays of vats, computers, and other lab equipment stacked neatly on top of one another, singing a tune of harmony that defines a species' future generations."
 district_MZ_ring_world_genomic_research: "Genomic Segment"
 district_MZ_ring_world_genomic_research_plural: "Genomic Segments"
 district_MZ_ring_world_genomic_research_desc: "Entire segments dedicated to research, manipulation, and preservation of genetic materials to pave the future of a growing empire."
 # enforcer
 zone_MZ_enforcer: "Enforcer Hub"
