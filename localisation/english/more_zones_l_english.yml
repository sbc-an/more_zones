 district_MZ_arcology_enforcer_desc: "As the need for law enforcement rose with population density, the enforcer agencies scrapped rigid outpost system in favor of a central megaplex that houses rapid-response units capable of deplaying anywhere on the planet within a single minute."
 district_MZ_ring_world_enforcer: "Enforcer Segment"
