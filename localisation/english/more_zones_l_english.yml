 district_MZ_ring_world_enforcer_desc: "These specialized law enforcement agencies utilize space-grade shuttles with specialized solar radiation shielding to plot a direct path through the vacuum of space, ensuring the fastest response time."
 # telepath
 zone_MZ_telepath: "Telepath Spire"
