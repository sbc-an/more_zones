 # payback origin finisher custom event
 more_zones.1001.name: "Repurposing MSI Medical Technology"
 more_zones.1001.desc: "As schematic DRM of §Y$NAME_MSI_country$§! technology fail across the galaxy, our scientists have managed to recover some of the data packets from derelict MSI infrastructure. With just a little work, we will be able to incorporate their advanced gene therapy infrastructure technologies into our own, and even improve upon it."
 more_zones.1001.a.tooltip: "We can now construct one §Y$zone_MZ_payback$§! district specialization on each of our colonies' city districts."
 more_zones.1001.b: "Let's start with our homeworld."
 more_zones.1001.b.tooltip: "All §Y$zone_payback_enlightenment$§! district specializations are replaced with §Y$zone_MZ_payback$§!.\n$more_zones.1001.a.tooltip$"
